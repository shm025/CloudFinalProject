<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — CMPS465</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent2: #ff4757;
      --text: #f0f0f0;
      --muted: #555;
      --done: #2a2a2a;
      --done-text: #444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* Header */
    header {
      margin-bottom: 56px;
    }

    .tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 10px;
      margin-bottom: 20px;
      animation: fadeIn 0.4s ease both;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      animation: slideUp 0.5s ease both 0.1s;
    }

    h1 span {
      color: var(--accent);
      display: block;
    }

    .subtitle {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      animation: fadeIn 0.5s ease both 0.2s;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      margin-bottom: 32px;
      animation: fadeIn 0.5s ease both 0.3s;
    }

    .stat {
      flex: 1;
      padding: 16px 20px;
      border-right: 1px solid var(--border);
      text-align: center;
    }

    .stat:last-child { border-right: none; }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      display: block;
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
      display: block;
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 0;
      margin-bottom: 40px;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
      animation: fadeIn 0.5s ease both 0.35s;
    }

    .input-area:focus-within {
      border-color: var(--accent);
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: none;
      outline: none;
      padding: 16px 20px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    button.add-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px 24px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #d4eb30; }
    button.add-btn:active { transform: scale(0.98); }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 2px;
      margin-bottom: 24px;
      animation: fadeIn 0.5s ease both 0.4s;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--text);
      color: var(--text);
    }

    /* Todo list */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 18px 20px;
      transition: border-color 0.15s, opacity 0.2s;
      animation: slideIn 0.25s ease both;
    }

    .todo-item:hover {
      border-color: #3a3a3a;
    }

    .todo-item.completed {
      background: var(--done);
      border-color: var(--done);
      opacity: 0.5;
    }

    /* Custom checkbox */
    .check-btn {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      position: relative;
    }

    .check-btn:hover {
      border-color: var(--accent);
    }

    .todo-item.completed .check-btn {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-btn svg {
      width: 12px;
      height: 12px;
      stroke: #000;
      stroke-width: 2.5;
      display: none;
    }

    .todo-item.completed .check-btn svg { display: block; }

    /* Todo text */
    .todo-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      transition: color 0.15s;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .todo-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Delete button */
    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: var(--accent2); }

    .del-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Error toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent2);
      color: white;
      padding: 12px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      z-index: 999;
      animation: slideToast 0.3s ease both;
      display: none;
    }

    .toast.show { display: block; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideToast {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Loading indicator */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    .loading::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="tag">CMPS465 // Cloud Project</div>
      <h1>Task<span>Flow</span></h1>
      <p class="subtitle">// Deployed via Azure Pipelines · Containerized with Docker · Hosted on App Service</p>
    </header>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-active">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="Add a new task..." maxlength="120" />
      <button class="add-btn" onclick="addTodo()">+ Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="todo-list" id="todo-list">
      <div class="loading">Loading</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = '/api/todos';
    let allTodos = [];
    let currentFilter = 'all';

    // ── Fetch all todos ──────────────────────────────────────────
    async function loadTodos() {
      try {
        const res = await fetch(API);
        allTodos = await res.json();
        renderTodos();
        updateStats();
      } catch (e) {
        showToast('Failed to load tasks');
      }
    }

    // ── Add todo ─────────────────────────────────────────────────
    async function addTodo() {
      const input = document.getElementById('todo-input');
      const title = input.value.trim();
      if (!title) return;

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });

        if (!res.ok) { showToast('Title is required'); return; }

        const todo = await res.json();
        allTodos.unshift(todo);
        input.value = '';
        renderTodos();
        updateStats();
      } catch (e) {
        showToast('Error adding task');
      }
    }

    // ── Toggle complete ──────────────────────────────────────────
    async function toggleTodo(id) {
      try {
        const res = await fetch(`${API}/${id}`, { method: 'PATCH' });
        const updated = await res.json();
        allTodos = allTodos.map(t => t.id === id ? updated : t);
        renderTodos();
        updateStats();
      } catch (e) {
        showToast('Error updating task');
      }
    }

    // ── Delete todo ──────────────────────────────────────────────
    async function deleteTodo(id) {
      try {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        allTodos = allTodos.filter(t => t.id !== id);
        renderTodos();
        updateStats();
      } catch (e) {
        showToast('Error deleting task');
      }
    }

    // ── Render ───────────────────────────────────────────────────
    function renderTodos() {
      const list = document.getElementById('todo-list');
      const filtered = allTodos.filter(t => {
        if (currentFilter === 'active') return !t.completed;
        if (currentFilter === 'done') return t.completed;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">◻</div>
            No tasks here yet.
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''}" id="item-${todo.id}">
          <button class="check-btn" onclick="toggleTodo('${todo.id}')">
            <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="1.5,6 4.5,9 10.5,3" />
            </svg>
          </button>
          <div class="todo-text">
            ${escapeHtml(todo.title)}
            <div class="todo-meta">${formatDate(todo.createdAt)}</div>
          </div>
          <button class="del-btn" onclick="deleteTodo('${todo.id}')">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <line x1="3" y1="3" x2="13" y2="13"/>
              <line x1="13" y1="3" x2="3" y2="13"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    // ── Stats ────────────────────────────────────────────────────
    function updateStats() {
      const done = allTodos.filter(t => t.completed).length;
      document.getElementById('stat-total').textContent = allTodos.length;
      document.getElementById('stat-active').textContent = allTodos.length - done;
      document.getElementById('stat-done').textContent = done;
    }

    // ── Filter ───────────────────────────────────────────────────
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTodos();
    }

    // ── Utils ────────────────────────────────────────────────────
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = '⚠ ' + msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Enter key support ────────────────────────────────────────
    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    // ── Init ─────────────────────────────────────────────────────
    loadTodos();
  </script>
</body>
</html>
