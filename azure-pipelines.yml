# ╔══════════════════════════════════════════════════════════════╗
# ║  CMPS465 — Azure Pipelines CI/CD                           ║
# ║  Pipeline: Test → Build → Push to ACR → Deploy to App Svc  ║
# ╚══════════════════════════════════════════════════════════════╝

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

variables:
  ACR_NAME: 'CMPS465a202400250'
  IMAGE_NAME: 'todo-app'
  APP_SERVICE_STAGING: 'cmps465-todo-staging'
  APP_SERVICE_PROD: 'cmps465-todo-prod'
  RESOURCE_GROUP: 'CMPS465-202400250'

  IMAGE_TAG: '$(Build.BuildId)'
  FULL_IMAGE: '$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG)'

# ══════════════════════════════════════════════════════════════
# STAGE 1 — CI: Install, Test, Build
# Runs on EVERY push to ANY branch
# ══════════════════════════════════════════════════════════════
stages:
- stage: CI
  displayName: 'CI — Test & Build'
  jobs:
  - job: Test
    displayName: 'Install & Run Tests'
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: NodeTool@0
      displayName: 'Use Node.js 20'
      inputs:
        versionSpec: '20.x'

    - script: npm ci
      displayName: 'Install dependencies'

    - script: npm test -- --ci
      displayName: 'Run unit tests'
      env:
        NODE_ENV: test

# ══════════════════════════════════════════════════════════════
# STAGE 2 — Docker Build + Push to ACR
# Runs ONLY on main branch after CI passes
# ══════════════════════════════════════════════════════════════
- stage: Docker
  displayName: 'Docker — Build & Push to ACR'
  dependsOn: CI
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - job: BuildAndPush
    displayName: 'Build Docker image & push'
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - script: |
        echo "$(ACR_PASSWORD)" | docker login CMPS465a202400250.azurecr.io \
          --username CMPS465a202400250 \
          --password-stdin
      displayName: 'Login to ACR'
      env:
        ACR_PASSWORD: $(ACR_PASSWORD)

    - script: |
        docker build -t CMPS465a202400250.azurecr.io/todo-app:$(Build.BuildId) \
                     -t CMPS465a202400250.azurecr.io/todo-app:latest .
      displayName: 'Build Docker image'

    - script: |
        docker push CMPS465a202400250.azurecr.io/todo-app:$(Build.BuildId)
        docker push CMPS465a202400250.azurecr.io/todo-app:latest
      displayName: 'Push to ACR'

# ══════════════════════════════════════════════════════════════
# STAGE 3 — Deploy to Staging App Service
# ══════════════════════════════════════════════════════════════
- stage: DeployStaging
  displayName: 'Deploy — Staging App Service'
  dependsOn: Docker
  condition: succeeded()

  jobs:
  - deployment: DeployToStaging
    displayName: 'Deploy to staging'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Deploy container to staging'
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              appName: '$(APP_SERVICE_STAGING)'
              containers: '$(FULL_IMAGE)'

          - script: |
              echo "✅ Staging deployment complete"
              echo "🔗 https://$(APP_SERVICE_STAGING).azurewebsites.net"
            displayName: 'Print staging URL'

# ══════════════════════════════════════════════════════════════
# STAGE 4 — Manual Approval Gate → Deploy to Production
# Pauses and waits for human approval in Azure DevOps
# ══════════════════════════════════════════════════════════════
- stage: DeployProduction
  displayName: 'Deploy — Production (Manual Approval)'
  dependsOn: DeployStaging
  condition: succeeded()

  jobs:
  - deployment: DeployToProduction
    displayName: 'Deploy to production'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Deploy container to production'
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              appName: '$(APP_SERVICE_PROD)'
              containers: '$(FULL_IMAGE)'

          - script: |
              echo "🚀 Production deployment complete!"
              echo "🔗 https://$(APP_SERVICE_PROD).azurewebsites.net"
            displayName: 'Print production URL'